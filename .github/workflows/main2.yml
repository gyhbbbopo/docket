name: docker-ngrok-ssh2

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 最多 6 小时

    steps:
    - name: Check Docker
      run: |
        docker --version
        docker info

    - name: Start Docker SSH container
      run: |
        docker run -d \
          --name dockerssh \
          -e SSH_USER=ttt0090 \
          -e SSH_PASSWORD=123789 \
          -p 2222:22 \
          ghcr.io/vevc/ubuntu:25.7.14

        echo "Waiting for container..."
        sleep 10
        docker ps

    - name: Install base tools
    run: |
        curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz \
          -o ngrok.tgz
        tar -xzf ngrok.tgz
        chmod +x ngrok

    - name: Auth ngrok
      run: |
        ./ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Start ngrok TCP 2222
      run: |
        ./ngrok tcp 2222 > ngrok.log &
        sleep 15

        curl -s http://127.0.0.1:4040/api/tunnels \
          | jq -r '.tunnels[0].public_url' \
          > public_url.txt

        echo "======================================"
        echo "SSH 公网入口："
        cat public_url.txt
        echo
        echo "用户名：ttt0090"
        echo "密码：123789"
        echo
        "======================================"

    - name: Download and prepare scripts
      run: |
        echo "===== 下载 ww12345.sh ====="
        wget https://raw.githubusercontent.com/yghhbbuy/vvvioui/refs/heads/main/.github/workflows/ww12345.sh -O ww12345.sh
        chmod +x ww12345.sh

        echo "===== 下载 OneDriveUploader ====="
        wget https://raw.githubusercontent.com/MoeClub/OneList/master/OneDriveUploader/amd64/linux/OneDriveUploader
        chmod +x OneDriveUploader

        echo "===== 下载 oneupalways2.sh ====="
        wget https://raw.githubusercontent.com/yghhbbuy/vvvioui/refs/heads/main/.github/workflows/oneupalways2.sh
        chmod +x oneupalways2.sh

    - name: Run scripts in background
      run: |
      echo "===== 执行 ww12345.sh ====="
        bash ww12345.sh

        echo "===== 后台循环执行 oneupalways2.sh ====="
        nohup bash -c '
          for i in $(seq 1 1000); do
            echo "Run round $i"
            bash oneupalways2.sh
          done
        ' > oneup.log 2>&1 &

    - name: Keep alive
      run: |
        for i in $(seq 1 360); do
          echo "alive minute $i"
          sleep 60
        done
