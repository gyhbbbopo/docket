name: docker-ngrok-ssh-au

on:
  schedule:
    # 每周六 UTC 22:00，北京时间周日 06:00
    - cron: '0 22 * * 6'
  workflow_dispatch:

jobs:
  tmux_autorun:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Start Docker SSH container
        run: |
          docker run -d \
            --name dockerssh \
            -e SSH_USER=ttt0090 \
            -e SSH_PASSWORD=123789 \
            -p 2222:22 \
            -p 443:443/tcp \
            -p 443:443/udp \
            -p 8443:8443/tcp \
            -p 8443:8443/udp \
            ghcr.io/vevc/ubuntu:25.7.14

          sleep 10
          docker ps -a

      - name: Install runner tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq grep sed

      - name: Download and start ngrok
        run: |
          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          chmod +x ngrok

          ./ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

          ./ngrok tcp 2222 > ngrok.log 2>&1 &
          sleep 15

          echo "Ngrok SSH TCP 地址："
          NGROK_URL="$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')"
          echo "$NGROK_URL"

          {
            echo "## Ngrok SSH 地址"
            echo ""
            echo '```'
            echo "$NGROK_URL"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare container for tmux and Hy2
        run: |
          docker exec dockerssh bash -lc '
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              wget \
              curl \
              tmux \
              grep \
              sed \
              ca-certificates \
              util-linux \
              iproute2 \
              lsof \
              expect
          '

      - name: Install Hy2 in Docker and output node link
        timeout-minutes: 60
        run: |
          set -e

          echo "开始在 Docker 容器中运行 Hy2 脚本..."

          docker exec -i \
            -e TERM=xterm \
            -e DEBIAN_FRONTEND=noninteractive \
            dockerssh bash -lc '
              set +e
              cd /root
              export TERM=xterm

              echo "下载 Hy2 脚本..."
              curl -fsSL https://raw.githubusercontent.com/a88wyzz/Alpine-Debian-Ubuntu-Hy2/main/hy2.sh -o /root/hy2.sh
              chmod +x /root/hy2.sh

              echo "生成 expect 自动安装脚本..."

              cat > /root/install_hy2.expect << "EOF"
#!/usr/bin/expect -f
set timeout 1800
log_file -a /root/hy2_install.log

set sent_install 0
set sent_port 0

spawn bash /root/hy2.sh

expect {
    -re {请输入数字选择.*$$0-5$$.*:} {
        if {$sent_install == 0} {
            send "1\r"
            set sent_install 1
        } else {
            send "0\r"
        }
        exp_continue
    }

    -re {随机端口|回车.*随机|直接回车|默认端口|请输入.*端口|监听端口} {
        if {$sent_port == 0} {
            send "\r"
            set sent_port 1
        }
        exp_continue
    }

    -re {按任意键返回主菜单|任意键} {
        send "\r"
        exp_continue
    }

    timeout {
        puts "Hy2 安装等待超时，继续后续提取日志。"
        exit 0
    }

    eof {
        exit 0
    }
}
EOF

              chmod +x /root/install_hy2.expect

              echo "开始安装 Hy2：输入 1，然后安装过程中遇到随机端口自动回车..."
              echo "----------------------------------------"
              /root/install_hy2.expect
              echo "----------------------------------------"
              echo "Hy2 安装步骤结束"

              echo "安装后额外等待 30 秒，给服务启动和配置生成留时间..."
              sleep 30

              echo "生成查看节点链接 expect 脚本..."

              cat > /root/show_hy2_link.expect << "EOF"
#!/usr/bin/expect -f
set timeout 600
log_file -a /root/hy2_show_link.log

set sent_show 0

spawn bash /root/hy2.sh

expect {
    -re {请输入数字选择.*$$0-5$$.*:} {
        if {$sent_show == 0} {
            send "2\r"
            set sent_show 1
        } else {
            send "0\r"
        }
        exp_continue
    }

    -re {按任意键返回主菜单|任意键} {
        send "\r"
        exp_continue
    }

    timeout {
        puts "查看 Hy2 节点链接等待超时，继续后续提取日志。"
        exit 0
    }

    eof {
        exit 0
    }
}
EOF

              chmod +x /root/show_hy2_link.expect

              echo "开始查看 Hy2 节点链接：输入 2..."
              echo "----------------------------------------"
              /root/show_hy2_link.expect
              echo "----------------------------------------"
              echo "查看 Hy2 节点链接步骤结束"

              exit 0
            ' || true

          echo ""
          echo "复制 Hy2 日志到 runner..."

          docker cp dockerssh:/root/hy2_install.log ./hy2_install_raw.log 2>/dev/null || true
          docker cp dockerssh:/root/hy2_show_link.log ./hy2_show_link_raw.log 2>/dev/null || true

          touch hy2_install_raw.log hy2_show_link_raw.log

          cat hy2_install_raw.log hy2_show_link_raw.log > hy2_all_raw.log
          sed -r 's/\x1B\[[0-9;]*[mK]//g' hy2_all_raw.log > hy2_all.log

          echo ""
          echo "===== Hy2 日志最后 500 行 ====="
          tail -n 500 hy2_all.log || true

          echo ""
          echo "===== 尝试提取 Hy2 节点链接 ====="

          grep -Eao '(hy2|hysteria2)://[^[:space:]"<>]+' hy2_all.log | sort -u > hy2_links.txt || true

          echo ""
          echo "===== 从容器 /root 和 /etc 中搜索 Hy2 链接 ====="

          docker exec dockerssh bash -lc '
            grep -RaoE "(hy2|hysteria2)://[^[:space:]\"<>]+" /root /etc 2>/dev/null || true
          ' | sort -u >> hy2_links.txt || true

          sort -u hy2_links.txt -o hy2_links.txt || true

          echo ""
          echo "===== Hy2 链接提取结果 ====="

          if [ ! -s hy2_links.txt ]; then
            echo "没有自动识别到 hy2:// 或 hysteria2:// 链接。"
            echo ""
            echo "下面列出可能的 Hy2 配置文件："

            docker exec dockerssh bash -lc '
              find /root /etc -maxdepth 8 -type f \
                $$ -iname "*hy2*" -o -iname "*hysteria*" -o -iname "*config*.yaml" -o -iname "*config*.yml" -o -iname "*.json" $$ \
                -print 2>/dev/null || true
            '

            echo ""
            echo "下面尝试输出可能的配置文件内容："

            docker exec dockerssh bash -lc '
              for f in $(find /root /etc -maxdepth 8 -type f $$ -iname "*hy2*" -o -iname "*hysteria*" -o -iname "*config*.yaml" -o -iname "*config*.yml" -o -iname "*.json" $$ 2>/dev/null); do
                echo "========== $f =========="
                sed -n "1,200p" "$f" 2>/dev/null || true
              done
            ' || true

            {
              echo "## Hy2 节点链接"
              echo ""
              echo "没有自动识别到 hy2:// 或 hysteria2:// 链接。"
              echo ""
              echo "请查看 Actions 日志里的 Hy2 日志最后 500 行。"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "识别到的 Hy2 节点链接："
            cat hy2_links.txt

            {
              echo "## Hy2 节点链接"
              echo ""
              echo '```'
              cat hy2_links.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: AUTO RUN with tmux FULL
        run: |
          docker exec dockerssh bash -lc "tmux has-session -t auto 2>/dev/null || tmux new-session -d -s auto 'cd /root; wget https://raw.githubusercontent.com/yghhbbuy/vvvioui/refs/heads/main/.github/workflows/ww12345.sh -O ww12345.sh && bash ww12345.sh; wget https://raw.githubusercontent.com/MoeClub/OneList/master/OneDriveUploader/amd64/linux/OneDriveUploader && chmod +x OneDriveUploader; wget https://raw.githubusercontent.com/yghhbbuy/vvvioui/refs/heads/main/.github/workflows/oneupalways2.sh; for i in {1..3}; do bash oneupalways2.sh; done'"

      - name: Keep alive
        run: |
          echo "保持运行 2 小时..."
          sleep 7200
