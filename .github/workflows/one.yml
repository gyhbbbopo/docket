name: docker-ngrok-ssh-au

on:
  schedule:
    # 每周六 UTC 22:00，北京时间周日 06:00
    - cron: '0 22 * * 6'
  workflow_dispatch:

jobs:
  tmux_autorun:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Start Docker SSH container
        run: |
          docker run -d \
            --name dockerssh \
            -e SSH_USER=ttt0090 \
            -e SSH_PASSWORD=123789 \
            -p 2222:22 \
            -p 443:443/tcp \
            -p 443:443/udp \
            -p 8443:8443/tcp \
            -p 8443:8443/udp \
            ghcr.io/vevc/ubuntu:25.7.14

          sleep 10
          docker ps -a

      - name: Install runner tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq grep sed

      - name: Download and start ngrok
        run: |
          curl -L https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -o ngrok.tgz
          tar -xzf ngrok.tgz
          chmod +x ngrok

          ./ngrok authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

          ./ngrok tcp 2222 > ngrok.log 2>&1 &
          sleep 15

          echo "Ngrok SSH TCP 地址："
          NGROK_URL="$(curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url')"
          echo "$NGROK_URL"

          {
            echo "## Ngrok SSH 地址"
            echo ""
            echo '```'
            echo "$NGROK_URL"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare container for tmux and Hy2
        run: |
          docker exec dockerssh bash -lc '
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              wget \
              curl \
              tmux \
              grep \
              sed \
              ca-certificates \
              util-linux \
              iproute2 \
              lsof \
              procps

            # Docker 容器没有 systemd，这里创建假的 systemctl，避免安装脚本中断
            cat > /usr/local/bin/systemctl << "EOF"
#!/bin/sh
echo "[fake systemctl] $@" >&2
exit 0
EOF
            chmod +x /usr/local/bin/systemctl

            echo "检查 systemctl："
            which systemctl
            systemctl status test || true
          '

      - name: Install Hy2 in Docker and output node link
        timeout-minutes: 80
        run: |
          set +e

          echo "开始在 Docker 容器中运行 Hy2 脚本..."

          docker exec -i \
            -e TERM=xterm \
            -e DEBIAN_FRONTEND=noninteractive \
            dockerssh bash -lc '
              cd /root
              export TERM=xterm
              export PATH="/usr/local/bin:$PATH"

              echo "下载 Hy2 脚本..."
              curl -fsSL https://raw.githubusercontent.com/a88wyzz/Alpine-Debian-Ubuntu-Hy2/main/hy2.sh -o /root/hy2.sh
              chmod +x /root/hy2.sh

              echo "开始运行 Hy2 脚本..."
              echo "输入顺序：1 -> 回车随机端口 -> 等待安装 -> 2 查看链接 -> 0 退出"
              echo "----------------------------------------"

              {
                sleep 3

                # 选择 [1] 安装 Hysteria2
                echo "1"

                # 等待进入监听端口输入位置
                sleep 10

                # 直接回车，选择 10000-65535 随机端口
                echo ""

                # 留足安装时间，5分钟
                sleep 300

                # 查看配置节点链接
                echo "2"

                sleep 15

                # 退出脚本
                echo "0"
              } | script -qfec "bash /root/hy2.sh" /root/hy2_install.log

              echo "----------------------------------------"
              echo "Hy2 脚本运行结束"

              echo ""
              echo "尝试手动启动 hysteria 服务..."

              HY_BIN="$(command -v hysteria 2>/dev/null || command -v hysteria2 2>/dev/null || find /usr/local/bin /usr/bin /root -type f $$ -name hysteria -o -name hysteria2 -o -name \"hysteria*\" $$ 2>/dev/null | head -n 1)"
              HY_CFG="$(find /etc /root -maxdepth 8 -type f $$ -iname \"*.yaml\" -o -iname \"*.yml\" -o -iname \"*.json\" $$ 2>/dev/null | grep -Ei \"hysteria|hy2|config\" | head -n 1)"

              echo "HY_BIN=$HY_BIN"
              echo "HY_CFG=$HY_CFG"

              if [ -n "$HY_BIN" ] && [ -n "$HY_CFG" ]; then
                chmod +x "$HY_BIN" 2>/dev/null || true
                tmux has-session -t hy2 2>/dev/null || tmux new-session -d -s hy2 "$HY_BIN server -c $HY_CFG"
                echo "已尝试在 tmux hy2 中启动：$HY_BIN server -c $HY_CFG"
              else
                echo "未找到 hysteria 二进制或配置文件，跳过手动启动。"
              fi
            ' || true

          echo ""
          echo "复制 Hy2 日志到 runner..."

          docker cp dockerssh:/root/hy2_install.log ./hy2_install_raw.log 2>/dev/null || true
          touch hy2_install_raw.log

          sed -r 's/\x1B\[[0-9;]*[mK]//g' hy2_install_raw.log > hy2_install.log

          echo ""
          echo "===== Hy2 日志最后 500 行 ====="
          tail -n 500 hy2_install.log || true

          echo ""
          echo "===== 尝试提取 Hy2 节点链接 ====="

          grep -Eao '(hy2|hysteria2)://[^[:space:]"<>]+' hy2_install.log | sort -u > hy2_links.txt || true

          echo ""
          echo "===== 从容器 /root 和 /etc 中搜索 Hy2 链接 ====="

          docker exec dockerssh bash -lc '
            grep -RaoE "(hy2|hysteria2)://[^[:space:]\"<>]+" /root /etc 2>/dev/null || true
          ' | sort -u >> hy2_links.txt || true

          sort -u hy2_links.txt -o hy2_links.txt || true

          echo ""
          echo "===== Hy2 链接提取结果 ====="

          if [ ! -s hy2_links.txt ]; then
            echo "没有自动识别到 hy2:// 或 hysteria2:// 链接。"
            echo ""
            echo "输出可能的配置文件路径："

            docker exec dockerssh bash -lc '
              find /root /etc -maxdepth 8 -type f \
                $$ -iname "*hy2*" -o -iname "*hysteria*" -o -iname "*config*.yaml" -o -iname "*config*.yml" -o -iname "*.json" $$ \
                -print 2>/dev/null || true
            '

            {
              echo "## Hy2 节点链接"
              echo ""
              echo "没有自动识别到 hy2:// 或 hysteria2:// 链接。"
              echo ""
              echo "请查看 Actions 日志里的 Hy2 日志最后 500 行。"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "识别到的 Hy2 节点链接："
            cat hy2_links.txt

            {
              echo "## Hy2 节点链接"
              echo ""
              echo '```'
              cat hy2_links.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: AUTO RUN with tmux FULL
        run: |
          docker exec dockerssh bash -lc "tmux has-session -t auto 2>/dev/null || tmux new-session -d -s auto 'cd /root; wget https://raw.githubusercontent.com/yghhbbuy/vvvioui/refs/heads/main/.github/workflows/ww12345.sh -O ww12345.sh && bash ww12345.sh; wget https://raw.githubusercontent.com/MoeClub/OneList/master/OneDriveUploader/amd64/linux/OneDriveUploader && chmod +x OneDriveUploader; wget https://raw.githubusercontent.com/yghhbbuy/vvvioui/refs/heads/main/.github/workflows/oneupalways2.sh; for i in {1..3}; do bash oneupalways2.sh; done'"

      - name: Keep alive
        run: |
          echo "保持运行 2 小时..."
          sleep 7200
