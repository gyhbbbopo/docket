              echo "请查看 Actions 日志里的 Hy2 安装日志最后 300 行。"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "识别到的 Hy2 节点链接："
            cat hy2_links.txt

            {
              echo "## Hy2 节点链接"
              echo ""
              echo '```'
              cat hy2_links.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

