          docker exec dockerssh bash -lc '
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              wget \
              curl \
              tmux \
              grep \
              sed \
              ca-certificates \
              util-linux \
              iproute2 \
              lsof
          '

      - name: Install Hy2 in Docker and output node link
        run: |
          set -e

          echo "开始在 Docker 容器中运行 Hy2 脚本..."

          docker exec -i \
            -e TERM=xterm \
            -e DEBIAN_FRONTEND=noninteractive \
            dockerssh bash -lc '
              set +e
              cd /root
              export TERM=xterm

              echo "下载 Hy2 脚本..."
              curl -fsSL https://raw.githubusercontent.com/a88wyzz/Alpine-Debian-Ubuntu-Hy2/main/hy2.sh -o /root/hy2.sh
              chmod +x /root/hy2.sh

              echo "开始运行 Hy2 脚本，并自动输入 y..."
              echo "----------------------------------------"

              # 使用 script 模拟 TTY，解决 TERM environment variable not set 等问题
              # 这里自动输入一次 y
              printf "y\n" | script -qfec "bash /root/hy2.sh" /root/hy2_install.log

              echo "----------------------------------------"
              echo "Hy2 脚本运行结束"
              exit 0
            ' || true

          echo ""
          echo "复制 Hy2 安装日志到 runner..."
